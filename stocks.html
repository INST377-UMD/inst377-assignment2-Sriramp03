<!-- File: stocks.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INST377 - Stocks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #fde5b9 0%, #ffcc80 50%, #ffe0b2 100%);
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    h1 {
      margin: 20px;
      font-size: 1.8rem;
    }
    .main-nav {
      background: #cc3300;
      text-align: center;
      padding: 8px 0;
    }
    .main-nav a {
      color: #000080;
      text-decoration: none;
      margin: 0 10px;
      font-size: 1rem;
    }
    .main-nav a:hover {
      text-decoration: underline;
    }
    main {
      padding: 20px;
    }
    .form-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .form-group input,
    .form-group select {
      padding: 5px;
      font-size: 1rem;
      border: 1px solid #000;
      border-radius: 5px;
    }
    .lookup-btn {
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
    }
    #stock-chart {
      max-width: 800px;
      margin: 100px auto;
    }
    #reddit-table {
      width: 80%;
      margin: 20px auto;
      border-collapse: collapse;
    }
    #reddit-table th,
    #reddit-table td {
      border: 1px solid #000;
      padding: 10px;
      text-align: center;
    }
    .audio-box {
      background: #006b3c;
      color: #fff;
      padding: 20px;
      margin: 20px auto;
      width: 80%;
      border-radius: 5px;
    }
    .audio-box ul { margin-left: 20px; }
    .audio-buttons {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      justify-content: center;
    }
    .audio-buttons button {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
</head>
<body>
  <h1>INST377 - Stocks</h1>
  <nav class="main-nav">
    <a href="index.html">Home</a> ·
    <a href="stocks.html">Stocks</a> ·
    <a href="dogs.html">Dogs</a>
  </nav>
  <main>
    <h2>Let's chart some stocks!</h2>
    <div class="form-group">
      <input type="text" id="ticker" placeholder="Ticker (e.g. AAPL)">
      <select id="range">
        <option value="30">30 Days</option>
        <option value="60">60 Days</option>
        <option value="90">90 Days</option>
      </select>
      <button id="lookup" class="lookup-btn" type="button">Lookup</button>
    </div>
    <canvas id="stock-chart"></canvas>
    <table id="reddit-table">
      <thead>
        <tr><th>Ticker</th><th>Comment Count</th><th>Sentiment</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="audio-box">
      <h2>Audio Navigation</h2>
      <ul>
        <li>Say "Lookup &lt;stock&gt;" (plots 30-day by default)</li>
        <li>Say "Navigate to &lt;page&gt;"</li>
        <li>Say "Change the color to &lt;color&gt;"</li>
        <li>Say "Hello"</li>
      </ul>
      <div class="audio-buttons">
        <button id="audio-on">Turn On Listening</button>
        <button id="audio-off">Turn Off Listening</button>
      </div>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const apiKey = 'tp2vwqR964eJ8h57pcuUYX6zHgWUlpCn';
      let chart;
      const lookupBtn = document.getElementById('lookup');
      const tickerInput = document.getElementById('ticker');
      const rangeSelect = document.getElementById('range');
      const ctx = document.getElementById('stock-chart').getContext('2d');

      async function fetchStock(cmdTicker) {
        const ticker = (cmdTicker || tickerInput.value.trim().toUpperCase());
        if (!ticker) return;
        const days = parseInt(rangeSelect.value, 10);
        tickerInput.value = ticker;
        const to = Math.floor(Date.now() / 1000);
        const from = to - days * 24 * 60 * 60;
        try {
          const res = await fetch(`https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=asc&limit=${days}&apiKey=${apiKey}`);
          const data = await res.json();
          if (!data.results || data.results.length === 0) {
            alert('No data found for ' + ticker);
            return;
          }
          const labels = data.results.map(r => new Date(r.t * 1000).toLocaleDateString());
          const values = data.results.map(r => r.c);
          if (chart) chart.destroy();
          chart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: `${ticker} Closing Price`, data: values, fill: false, borderColor: 'blue' }] },
            options: { responsive: true }
          });
        } catch (err) {
          console.error(err);
          alert('Error fetching stock data: ' + err.message);
        }
      }

      lookupBtn.addEventListener('click', () => fetchStock());

      // Load top 5 Reddit stocks
      fetch('https://tradestie.com/api/v1/apps/reddit?date=2022-04-03')
        .then(res => res.json())
        .then(data => {
          const tbody = document.querySelector('#reddit-table tbody');
          data.slice(0, 5).forEach(item => {
            const sentimentIcon = item.sentiment === 'Bullish' ? '🐂' : '🐻';
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td><a href="https://finance.yahoo.com/quote/${item.ticker}" target="_blank">${item.ticker}</a></td>
              <td>${item.no_of_comments}</td>
              <td>${sentimentIcon}</td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(console.error);

      // Audio commands
      if (window.annyang) {
        annyang.setLanguage('en-US');
        const commands = {
          'lookup *stock': stock => fetchStock(stock.toUpperCase()),
          'navigate to *page': page => {
            const p = page.trim().toLowerCase();
            window.location.href = p === 'home' ? 'index.html' : `${p}.html`;
          },
          'change the color to *color': color => document.body.style.backgroundColor = color,
          'hello': () => alert('Hello World')
        };
        annyang.addCommands(commands);
        annyang.start({ autoRestart: true, continuous: true });
        document.getElementById('audio-on').onclick = () => annyang.start({ autoRestart: true, continuous: true });
        document.getElementById('audio-off').onclick = () => annyang.abort();
      }
    });
  </script>
</body>
</html>
