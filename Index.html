<!-- File: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>INST377 - Activities</title>
  <style>
    body {
      background: linear-gradient(135deg, #fde5b9 0%, #ffcc80 50%, #ffe0b2 100%);
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #fde5b9;
      border-bottom: 4px solid #cc3300;
    }
    header h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #000;
    }
    header nav ul {
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    header nav a {
      color: #000080;
      text-decoration: none;
      font-size: 1rem;
    }
    header nav a:hover {
      text-decoration: underline;
    }
    main {
      padding: 20px;
      text-align: center;
    }
    .home-buttons {
      display: inline-flex;
      gap: 20px;
      margin: 30px 0;
    }
    .home-buttons button {
      background: #e60026;
      color: #fff;
      border: none;
      border-right: 10px solid #00ffff;
      padding: 15px 30px;
      font-size: 1rem;
      cursor: pointer;
      clip-path: polygon(10% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 10%);
      transition: opacity 0.2s;
    }
    .home-buttons button:hover {
      opacity: 0.9;
    }
    .quote-box {
      background: #f2f2f2;
      border: 1px solid #000;
      padding: 20px;
      width: 60%;
      margin: 20px auto;
      text-align: center;
    }
    .quote-box h3 {
      margin: 0 0 10px;
    }
    .audio-box {
      background: #006b3c;
      color: #fff;
      padding: 20px;
      margin: 20px auto;
      width: 80%;
      border-radius: 5px;
      text-align: left;
    }
    .audio-box ul { margin-left: 20px; }
    .audio-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    .audio-buttons button {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>INST377 - Activities</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="stocks.html">Stocks</a></li>
        <li><a href="dogs.html">Dogs</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>These are some different activities we can try!</h2>
    <div class="home-buttons">
      <button onclick="location.href='stocks.html'">Stocks</button>
      <button onclick="location.href='dogs.html'">Dogs</button>
    </div>
    <div class="quote-box">
      <h3>Quote of the Page Load</h3>
      <p id="quote-text">Loading quote...</p>
    </div>
    <div class="audio-box">
      <h2>Audio Navigation</h2>
      <ul>
        <li>Say "Navigate to &lt;page&gt;" (Home, Stocks, Dogs)</li>
        <li>Say "Change the color to &lt;color&gt;"</li>
        <li>Say "Hello"</li>
      </ul>
      <div class="audio-buttons">
        <button id="audio-on">Turn On Listening</button>
        <button id="audio-off">Turn Off Listening</button>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
  <script>
    // Fetch random quote
    fetch('https://zenquotes.io/api/random')
      .then(res => res.json())
      .then(data => {
        const q = data[0];
        document.getElementById('quote-text').innerHTML = `"${q.q}" — <em>${q.a}</em>`;
      });

    // Audio commands
    if (window.annyang) {
      annyang.setLanguage('en-US');
      const commands = {
        'navigate to *page': page => {
          const p = page.toLowerCase();
          if (['home','stocks','dogs'].includes(p)) {
            window.location.href = p === 'home' ? 'index.html' : p + '.html';
          }
        },
        'change the color to *color': color => document.body.style.backgroundColor = color,
        'hello': () => alert('Hello World')
      };
      annyang.addCommands(commands);
      annyang.start({ autoRestart: true, continuous: true });
      document.getElementById('audio-on').onclick = () => annyang.start({ autoRestart: true, continuous: true });
      document.getElementById('audio-off').onclick = () => annyang.abort();
    }
  </script>
</body>
</html>
